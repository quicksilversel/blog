name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        script: [lint, test, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.script }}
        run: npm run ${{ matrix.script }}
